id: css-gradient-borders
name: CSS Gradient Borders
url: "https://codepen.io/shivam091/pen/MYjEqeo"
files:
  - name: index.html
    type: html
    code: |
      <section class="app">
        <h1>CSS Gradient Borders</h1>

        <!-- Controls -->
        <div class="controls">
          <div class="control">
            <label>Gradient Type</label>
            <select id="type">
              <option value="linear">Linear</option>
              <option value="conic">Conic</option>
              <option value="radial">Radial</option>
              <option value="repeating">Repeating</option>
            </select>
          </div>
          <div class="control">
            <label>Angle: <span id="angleVal">45</span>°</label>
            <input type="range" min="0" max="360" value="45" id="angle">
          </div>

          <div class="control">
            <label>Border Size</label>
            <input type="range" min="2" max="20" value="6" id="size">
          </div>

          <div class="control">
            <label>Radius</label>
            <input type="range" min="0" max="40" value="12" id="radius">
          </div>

          <div class="control">
            <label>Start Color</label>
            <input type="color" id="color1" value="#ff6a00">
          </div>

          <div class="control">
            <label>End Color</label>
            <input type="color" id="color2" value="#ee0979">
          </div>

          <div class="checkbox">
            <label>Animate Border</label>
            <input type="checkbox" id="animate">
          </div>
        </div>

        <!-- Preview -->
        <div class="preview-box" id="preview">
          Gradient Border
        </div>

        <!-- CSS Output -->
        <pre class="code" id="cssOutput"></pre>
      </section>
