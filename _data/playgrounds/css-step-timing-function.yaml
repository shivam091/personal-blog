      :root {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --accent: #0ea5e9;
        --text: #f8fafc;
      }
  - name: style.css
    type: css
    code: |
      body {
        background-color: var(--bg-color);
        color: var(--text);
        font-family: "Inter", sans-serif;
        padding: 2rem;
      }

      .playground-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
        gap: 2rem;
        max-width: 1000px;
        margin: 0 auto;
      }

      .example-box {
        background: var(--card-bg);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid #334155;
        text-align: center;
      }

      /* --- 1. TYPEWRITER --- */
      .typewriter {
        font-family: "Courier New", monospace;
        font-size: 1.2rem;
        width: 0;
        white-space: nowrap;
        overflow: hidden;
        border-right: 0.15em solid orange;
        margin: 1rem auto;
        animation: typing 4s steps(42, end) infinite,
          blink-caret 0.75s step-end infinite;
      }

      @keyframes typing {
        0%,
        10% {
          width: 0;
        }
        70%,
        100% {
          width: 100%;
        }
      }

      @keyframes blink-caret {
        from,
        to {
          border-color: transparent;
        }
        50% {
          border-color: orange;
        }
      }

      /* --- 2. CLOCK --- */
      .clock-face {
        width: 120px;
        height: 120px;
        border: 4px solid #475569;
        border-radius: 50%;
        position: relative;
        margin: 1rem auto;
      }

      .second-hand {
        position: absolute;
        bottom: 50%;
        left: 50%;
        width: 2px;
        height: 50px;
        background-color: #ef4444;
        transform-origin: bottom center;
        transform: translateX(-50%);
        animation: rotate-seconds 60s steps(60, end) infinite;
      }

      @keyframes rotate-seconds {
        from {
          transform: translateX(-50%) rotate(0deg);
        }
        to {
          transform: translateX(-50%) rotate(360deg);
        }
      }

      /* --- 3. LOADER --- */
      .loader-container {
        margin: 1.5rem 0;
      }
      .loader {
        width: 100%;
        height: 20px;
        background: linear-gradient(90deg, var(--accent) 0 50%, #334155 50%);
        background-size: 200%;
        border-radius: 4px;
        transition: background-position 2s steps(4, end);
      }
      .example-box:hover .loader {
        background-position: -100%;
      }

      /* --- 4. SPRITE MOCK --- */
      /* We simulate a 5-frame sprite sheet using a striped gradient */
      .sprite-mock {
        width: 60px;
        height: 60px;
        margin: 1rem auto;
        border: 2px solid #334155;
        background-image: linear-gradient(
          to right,
          #f43f5e 20%,
          #fbbf24 20% 40%,
          #10b981 40% 60%,
          #6366f1 60% 80%,
          #a855f7 80%
        );
        background-size: 500% 100%; /* 5 frames */
        animation: walk 2s steps(5) infinite;
      }

      @keyframes walk {
        to {
          background-position: -300px 0;
        }
      }

      /* --- ACCESSIBILITY --- */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }

