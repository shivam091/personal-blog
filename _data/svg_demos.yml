      const d = `M 10 50 C 20 10 40 ${c2y} 50 50 S 80 ${s2y} 90 50`;
      path.setAttribute("d", d);

      gc.setAttribute("d", `M 10 50 L 20 10 40 ${c2y} 50 50`);
      gs.setAttribute("d", `M 50 50 L ${gx} ${gy} 80 ${s2y} 90 50`);

      cpC2.setAttribute("cy", c2y);
      cpSGhost.setAttribute("cx", gx); cpSGhost.setAttribute("cy", gy);
      cpS2.setAttribute("cy", s2y);

      document.querySelectorAll(".range-value").forEach((el, i) => el.textContent = [c2y, s2y][i]);
    }));

