t_command_demo:
  title: "Path Command: T (Smooth Quadratic Bézier)"
  html: |
    <div class="wrapper">
      <div class="canvas">
        <svg viewBox="0 0 100 100">
          <path id="guide-q" d="M 10 50 L 30 10 50 50" stroke="var(--color-fg-muted)" stroke-dasharray="2" fill="none" opacity="0.4" />
          <path id="guide-t" d="M 50 50 L 70 90 90 50" stroke="var(--color-fg-accent)" stroke-dasharray="2" fill="none" opacity="0.3" />

          <path id="target" d="M 10 50 Q 30 10 50 50 T 90 50" fill="none" stroke="#ec4899" stroke-width="1" />

          <circle id="cp-q" cx="30" cy="10" r="2" fill="#ec4899" />
          <circle id="cp-ghost" cx="70" cy="90" r="2" fill="none" stroke="#ec4899" stroke-dasharray="1" />
          <text id="ghost-label" x="72" y="95" font-size="3" fill="#ec4899" opacity="0.7">Reflected Point</text>
        </svg>
      </div>
      <div class="controls">
        <div class="field">
          <label>Q Control Y: <span class="range-value">10</span></label>
          <input type="range" id="qy" min="0" max="100" value="10">
        </div>
        <div class="field">
          <label>T End X: <span class="range-value">90</span></label>
          <input type="range" id="tx" min="60" max="100" value="90">
        </div>
      </div>
    </div>
  css: *shared_css
  js: |
    const path = document.getElementById("target");
    const guideQ = document.getElementById("guide-q");
    const guideT = document.getElementById("guide-t");
    const cpQ = document.getElementById("cp-q");
    const cpGhost = document.getElementById("cp-ghost");
    const label = document.getElementById("ghost-label");

    document.querySelectorAll("input").forEach(i => i.addEventListener("input", () => {
      const qy = parseInt(document.getElementById("qy").value);
      const tx = parseInt(document.getElementById("tx").value);

      // The T reflection math:
      // Current point is (50, 50). Prev CP is (30, qy).
      // Reflection is: (50 + (50-30), 50 + (50-qy)) = (70, 100-qy)
      const rx = 70;
      const ry = 100 - qy;

      const d = `M 10 50 Q 30 ${qy} 50 50 T ${tx} 50`;
      path.setAttribute("d", d);

      guideQ.setAttribute("d", `M 10 50 L 30 ${qy} 50 50`);
      guideT.setAttribute("d", `M 50 50 L ${rx} ${ry} ${tx} 50`);

      cpQ.setAttribute("cy", qy);
      cpGhost.setAttribute("cx", rx); cpGhost.setAttribute("cy", ry);
      label.setAttribute("x", rx + 2); label.setAttribute("y", ry + 5);

      document.querySelectorAll(".range-value").forEach((el, i) => el.textContent = [qy, tx][i]);
    }));

