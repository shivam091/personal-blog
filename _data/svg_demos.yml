heart_shape_demo:
  title: "Practical Example: The Heart Shape"
  html: |
    <div class="wrapper">
      <div class="canvas">
        <svg viewBox="0 0 100 100">
          <path id="target" d="M 10 35 A 20 20 0 0 1 50 35 A 20 20 0 0 1 90 35 Q 90 65 50 95 Q 10 65 10 35 Z"
                fill="#f43f5e" fill-opacity="0.2" stroke="#e11d48" stroke-width="1" />
          <circle cx="50" cy="35" r="1" fill="#e11d48" />
          <circle id="tip-marker" cx="50" cy="95" r="1.5" fill="#e11d48" />
        </svg>
      </div>
      <div class="controls">
        <div class="field">
          <label for="radius">Hump Radius (rx/ry): <span class="range-value">20</span></label>
          <input type="range" id="radius" min="15" max="25" value="20">
        </div>
        <div class="field">
          <label for="tip">Tip Depth (y): <span class="range-value">95</span></label>
          <input type="range" id="tip" min="70" max="100" value="95">
        </div>
        <div class="field">
          <label for="bulge">Bulge Intensity: <span class="range-value">65</span></label>
          <input type="range" id="bulge" min="40" max="80" value="65">
        </div>
      </div>
    </div>
  css: *shared_css
  js: |
    const path = document.getElementById("target");
    const marker = document.getElementById("tip-marker");
    const inputs = ["radius", "tip", "bulge"];

    function update() {
      const r = document.getElementById("radius").value;
      const t = document.getElementById("tip").value;
      const b = document.getElementById("bulge").value;

      // Building the heart d-attribute:
      // M start -> Arc Left -> Arc Right -> Q Bottom Right -> Q Bottom Left -> Z
      const d = `M 10 35
                 A ${r} ${r} 0 0 1 50 35
                 A ${r} ${r} 0 0 1 90 35
                 Q 90 ${b} 50 ${t}
                 Q 10 ${b} 10 35 Z`;

      path.setAttribute("d", d);
      marker.setAttribute("cy", t);

      inputs.forEach(id => {
        const el = document.getElementById(id);
        el.parentElement.querySelector(".range-value").textContent = el.value;
      });
    }

    inputs.forEach(id => document.getElementById(id).addEventListener("input", update));
