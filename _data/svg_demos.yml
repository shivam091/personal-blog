          <path id="target" d="M 10 50 C 20 10 40 10 50 50 S 80 90 90 50" fill="none" stroke="#6366f1" stroke-width="1" />

          <circle id="cp-c2" cx="40" cy="10" r="1" fill="#6366f1" />
          <circle id="cp-s-ghost" cx="60" cy="90" r="1" fill="none" stroke="#6366f1" stroke-dasharray="1" />
          <circle id="cp-s2" cx="80" cy="90" r="1" fill="#6366f1" />
        </svg>
      </div>
      <div class="controls">
        <div class="field">
          <label>C2 (Exit) Y: <span class="range-value">10</span></label>
          <input type="range" id="c2y" min="0" max="50" value="10">
        </div>
        <div class="field">
          <label>S2 (Entry) Y: <span class="range-value">90</span></label>
          <input type="range" id="s2y" min="50" max="100" value="90">
        </div>
      </div>
    </div>
  css: *shared_css
  js: |
    const path = document.getElementById("target");
    const gc = document.getElementById("guide-c");
    const gs = document.getElementById("guide-s");
