    const cpSGhost = document.getElementById("cp-s-ghost");
    const cpS2 = document.getElementById("cp-s2");

    document.querySelectorAll("input").forEach(i => i.addEventListener("input", () => {
      const c2y = parseInt(document.getElementById("c2y").value);
      const s2y = parseInt(document.getElementById("s2y").value);

      // Reflection math:
      // Current anchor point is (50, 50). Prev C2 is (40, c2y).
