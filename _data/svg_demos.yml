  title: "Path Command: S (Smooth Cubic Bézier)"
  html: |
    <div class="wrapper">
      <div class="canvas">
        <svg viewBox="0 0 100 100">
          <path id="guide-c" d="M 10 50 20 10 40 10 50 50" stroke="var(--color-fg-muted)" stroke-dasharray="2" fill="none" opacity="0.4" />
